<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — ChronoLux</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">Chrono<span>Lux</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="men.html" class="nav-link" data-category="men">Men's Watches</a>
        <a href="women.html" class="nav-link" data-category="women">Women's Watches</a>
      </div>
      <div class="nav-actions">
        <div id="auth-links"></div>
        <a href="cart.html" class="cart-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Cart
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="mobile-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="men.html" class="nav-link" data-category="men">Men's</a>
    <a href="women.html" class="nav-link" data-category="women">Women's</a>
    <a href="cart.html" class="nav-link">Cart</a>
  </div>
  <div class="container" id="checkout-content">
    <header class="page-header">
      <h1 class="page-title">Checkout</h1>
      <p class="page-subtitle">Complete your order</p>
    </header>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">ChronoLux</span>
      <span class="footer-text">&copy; 2026 ChronoLux. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('redirect');

    const items = Cart.getItems();
    const container = document.getElementById('checkout-content');

    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>Your cart is empty</h2>
          <p>Add some watches before checking out.</p>
          <a href="index.html" class="btn btn-primary">Start Shopping</a>
        </div>
      `;
    } else {
      const user = Auth.getUser();
      const subtotal = Cart.getTotal();
      const shipping = subtotal >= 200 ? 0 : 9.99;
      const total = subtotal + shipping;

      container.innerHTML = `
        <div class="cart-layout">
          <div>
            <form id="checkout-form">
              <h2 class="section-title" style="font-size:1.5rem;margin-bottom:24px">Shipping Details</h2>
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="ship-name" value="${user.name}" required />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="ship-email" value="${user.email}" required />
              </div>
              <div class="form-group">
                <label>Address</label>
                <input type="text" id="ship-address" placeholder="123 Main St" required />
              </div>
              <div class="form-group">
                <label>City</label>
                <input type="text" id="ship-city" placeholder="New York" required />
              </div>
              <div class="form-group">
                <label>ZIP Code</label>
                <input type="text" id="ship-zip" placeholder="10001" required />
              </div>
              <h2 class="section-title" style="font-size:1.5rem;margin:32px 0 24px">Payment</h2>
              <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="4242 4242 4242 4242" maxlength="19" required />
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-group">
                  <label>Expiry</label>
                  <input type="text" placeholder="MM/YY" maxlength="5" required />
                </div>
                <div class="form-group">
                  <label>CVC</label>
                  <input type="text" placeholder="123" maxlength="4" required />
                </div>
              </div>
              <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:24px">Place Order — ${formatPrice(total)}</button>
            </form>
          </div>
          <div class="cart-summary">
            <h2>Order Summary</h2>
            ${items.map((item) => {
              const p = getProductById(item.productId);
              return p ? `<div class="summary-row"><span>${p.name} × ${item.quantity}</span><span>${formatPrice(p.price * item.quantity)}</span></div>` : '';
            }).join('')}
            <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : formatPrice(shipping)}</span></div>
            <div class="summary-row total"><span>Total</span><span>${formatPrice(total)}</span></div>
          </div>
        </div>
      `;

      document.getElementById('checkout-form').addEventListener('submit', (e) => {
        e.preventDefault();
        Cart.clear();
        container.innerHTML = `
          <div class="checkout-success">
            <div class="icon">✓</div>
            <h1>Order Placed!</h1>
            <p style="color:var(--text-muted);margin-bottom:32px">Thank you for shopping at ChronoLux. Your timepieces are on their way.</p>
            <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
