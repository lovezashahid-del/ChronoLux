<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ChronoLux</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">Chrono<span>Lux</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="men.html" class="nav-link" data-category="men">Men's Watches</a>
        <a href="women.html" class="nav-link" data-category="women">Women's Watches</a>
      </div>
      <div class="nav-actions">
        <div id="auth-links"></div>
        <a href="cart.html" class="cart-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Cart
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="mobile-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="men.html" class="nav-link" data-category="men">Men's</a>
    <a href="women.html" class="nav-link" data-category="women">Women's</a>
    <a href="cart.html" class="nav-link">Cart</a>
  </div>

  <div class="container">
    <header class="page-header">
      <h1 class="page-title">Shopping Cart</h1>
      <p class="page-subtitle" id="cart-subtitle"></p>
    </header>
    <div id="cart-content"></div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">ChronoLux</span>
      <span class="footer-text">&copy; 2026 ChronoLux. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('redirect');

    function renderCart() {
      const items = Cart.getItems();
      const container = document.getElementById('cart-content');
      const subtitle = document.getElementById('cart-subtitle');

      if (items.length === 0) {
        subtitle.textContent = 'Your cart is empty';
        container.innerHTML = `
          <div class="empty-state">
            <h2>Nothing here yet</h2>
            <p>Browse our collections and find your perfect timepiece.</p>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
              <a href="men.html" class="btn btn-men">Shop Men's</a>
              <a href="women.html" class="btn btn-women">Shop Women's</a>
            </div>
          </div>
        `;
        return;
      }

      const itemCount = items.reduce((s, i) => s + i.quantity, 0);
      subtitle.textContent = `${itemCount} item${itemCount > 1 ? 's' : ''} in your cart`;

      const subtotal = Cart.getTotal();
      const shipping = subtotal >= 200 ? 0 : 9.99;
      const total = subtotal + shipping;

      const itemsHtml = items.map((item) => {
        const product = getProductById(item.productId);
        if (!product) return '';
        return `
          <div class="cart-item" data-id="${item.productId}">
            <div class="cart-item-image">
              <img src="${product.image}" alt="${product.name}" />
            </div>
            <div class="cart-item-info">
              <span class="cart-item-brand">${product.brand}</span>
              <h3 class="cart-item-name">${product.name}</h3>
              <p class="cart-item-price">${formatPrice(product.price)} each</p>
              <div class="qty-controls" style="margin-top:12px">
                <button class="qty-btn qty-decrease" data-id="${item.productId}">−</button>
                <span class="qty-value">${item.quantity}</span>
                <button class="qty-btn qty-increase" data-id="${item.productId}">+</button>
              </div>
            </div>
            <div class="cart-item-actions">
              <span class="cart-item-price">${formatPrice(product.price * item.quantity)}</span>
              <button class="remove-btn" data-id="${item.productId}">Remove</button>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">${itemsHtml}</div>
          <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>${shipping === 0 ? 'Free' : formatPrice(shipping)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <a href="checkout.html" class="btn btn-primary btn-block btn-lg">Proceed to Checkout</a>
            <a href="index.html" class="btn btn-outline btn-block" style="margin-top:12px">Continue Shopping</a>
          </div>
        </div>
      `;

      container.querySelectorAll('.qty-decrease').forEach((btn) => {
        btn.addEventListener('click', () => {
          const item = items.find((i) => i.productId === btn.dataset.id);
          Cart.updateQuantity(btn.dataset.id, item.quantity - 1);
          renderCart();
        });
      });

      container.querySelectorAll('.qty-increase').forEach((btn) => {
        btn.addEventListener('click', () => {
          const item = items.find((i) => i.productId === btn.dataset.id);
          Cart.updateQuantity(btn.dataset.id, item.quantity + 1);
          renderCart();
        });
      });

      container.querySelectorAll('.remove-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          Cart.removeItem(btn.dataset.id);
          renderCart();
        });
      });
    }

    renderCart();
  </script>
</body>
</html>
