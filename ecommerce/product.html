<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ChronoLux</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">Chrono<span>Lux</span></a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="men.html" class="nav-link" data-category="men">Men's Watches</a>
        <a href="women.html" class="nav-link" data-category="women">Women's Watches</a>
      </div>
      <div class="nav-actions">
        <div id="auth-links"></div>
        <a href="cart.html" class="cart-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Cart
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="mobile-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="men.html" class="nav-link" data-category="men">Men's</a>
    <a href="women.html" class="nav-link" data-category="women">Women's</a>
    <a href="cart.html" class="nav-link">Cart</a>
  </div>

  <div class="container">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="product-detail" id="product-detail"></div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">ChronoLux</span>
      <span class="footer-text">&copy; 2026 ChronoLux. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const product = getProductById(productId);

    if (!product) {
      document.getElementById('product-detail').innerHTML = `
        <div class="empty-state">
          <h2>Product Not Found</h2>
          <p>The watch you're looking for doesn't exist.</p>
          <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
      `;
    } else {
      Auth.setSession(product.category);

      const categoryLabel = product.category === 'men' ? "Men's" : "Women's";
      const categoryLink = product.category === 'men' ? 'men.html' : 'women.html';

      document.getElementById('breadcrumb').innerHTML = `
        <a href="index.html">Home</a><span>/</span>
        <a href="${categoryLink}">${categoryLabel}</a><span>/</span>
        ${product.name}
      `;

      document.title = `${product.name} — ChronoLux`;

      let quantity = 1;

      function renderDetail() {
        document.getElementById('product-detail').innerHTML = `
          <div class="product-detail-image">
            <img src="${product.image}" alt="${product.name}" />
          </div>
          <div class="product-detail-info">
            <span class="product-detail-brand">${product.brand}</span>
            <h1>${product.name}</h1>
            <p class="product-detail-rating">${renderStars(product.rating)} ${product.rating} / 5.0</p>
            <p class="product-detail-price">${formatPrice(product.price)}</p>
            <p class="product-detail-desc">${product.description}</p>
            <div class="quantity-selector">
              <label>Quantity</label>
              <div class="qty-controls">
                <button class="qty-btn" id="qty-minus">−</button>
                <span class="qty-value" id="qty-value">${quantity}</span>
                <button class="qty-btn" id="qty-plus">+</button>
              </div>
            </div>
            <div class="product-actions">
              <button class="btn btn-lg btn-primary" id="add-to-cart">Add to Cart</button>
              <a href="${categoryLink}" class="btn btn-lg btn-outline">Back to ${categoryLabel}</a>
            </div>
          </div>
        `;

        document.getElementById('qty-minus').addEventListener('click', () => {
          if (quantity > 1) { quantity--; renderDetail(); }
        });
        document.getElementById('qty-plus').addEventListener('click', () => {
          quantity++; renderDetail();
        });
        document.getElementById('add-to-cart').addEventListener('click', () => {
          if (!Auth.isLoggedIn()) {
            window.location.href = 'login.html';
            return;
          }
          Cart.addItem(product.id, quantity);
          showToast(`${product.name} added to cart!`);
        });
      }

      renderDetail();
    }
  </script>
</body>
</html>
